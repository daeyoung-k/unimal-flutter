name: Merge to Notion Devlog

# master로 PR이 머지되면 해당 PR의 커밋을 모아
# Notion 🛠 개발 로그 DB에 한 줄로 기록한다.
on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  devlog:
    # 닫히기만 한 PR은 제외, 실제 머지된 경우만
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Notion 개발 로그 기록
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DEVLOG_DB_ID: "61dba958274b460ba54696ea8746edaf"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: node scripts/merge-to-notion.mjs
