name: Changelog to Notion

# vX.Y.Z 형식 태그를 push하면 직전 태그~이번 태그 사이 커밋을
# Notion 체인지로그 DB에 한 줄로 기록한다.
on:
  push:
    tags:
      - "v*"

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (전체 히스토리 + 태그)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Notion 체인지로그 기록
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          PLATFORMS: "Android,iOS"
        run: node scripts/changelog-to-notion.mjs
